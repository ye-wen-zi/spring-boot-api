version: '3.8'

services:
  mysql-service:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      # test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      # timeout: 5s
      # retries: 5

      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  redis-service:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: redis-container
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

  spring-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spring-container
    ports:
      - "${SPRING_LOCAL_PORT}:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-service:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}

      - SPRING_DATA_REDIS_HOST=redis-service
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO}
      - SPRING_JPA_DATABASE=${SPRING_JPA_DATABASE}

      # - SPRING_SQL_INIT_MODE=${SPRING_SQL_INIT_MODE}

      - SPRING_DOC_ENABLE_API_DOC=${SPRING_DOC_ENABLE_API_DOC}
      - SPRING_DOC_ENABLE_SWAGGER_UI=${SPRING_DOC_ENABLE_SWAGGER_UI}

      - SPRING_SECURITY_SECURE_COOKIE=${SPRING_SECURITY_SECURE_COOKIE}
      - SPRING_SECURITY_JWT_SECRET=${SPRING_SECURITY_JWT_SECRET}
      - SPRING_SECURITY_ACCESS_TOKEN_EXPIRATION=${SPRING_SECURITY_ACCESS_TOKEN_EXPIRATION}
      - SPRING_SECURITY_REFRESH_TOKEN_EXPIRATION=${SPRING_SECURITY_REFRESH_TOKEN_EXPIRATION}
      - SPRING_SECURITY_HASH_IDS_SALT=${SPRING_SECURITY_HASH_IDS_SALT}

      # - APP_SEED_DATA=${APP_SEED_DATA}
    depends_on:
      mysql-service:
        condition: service_healthy
      redis-service:
        condition: service_started
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
